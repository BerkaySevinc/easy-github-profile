<svg xmlns="http://www.w3.org/2000/svg" width="800" height="310" viewBox="0 0 800 310">
  <style>
    @media (prefers-color-scheme: dark) {
      .ttl   { fill: #e6edf3; }
      .hdl   { stroke: #30363d; }
      .card  { fill: #161b22; stroke: #30363d; }
      .cname { fill: #58a6ff; }
      .cdesc { fill: #8b949e; }
      .cmeta { fill: #8b949e; }
    }
    @media (prefers-color-scheme: light) {
      .ttl   { fill: #1f2328; }
      .hdl   { stroke: #d0d7de; }
      .card  { fill: #f6f8fa; stroke: #d0d7de; }
      .cname { fill: #0969da; }
      .cdesc { fill: #636e7b; }
      .cmeta { fill: #636e7b; }
    }
    .card  { stroke-width: 1; }
    .ttl   { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size: 14px; font-weight: 600; }
